_target_: egomimic.pl_utils.pl_model.ModelWrapper

# Franka-only baseline for comparison with the cotrain model.
# Identical trunk/head architecture to the franka head in hpt_cotrain_mimicgen,
# trained on franka_right_arm data only.

robomimic_model:
  _target_: egomimic.algo.hpt.HPT
  camera_transforms:
    franka_right_arm:
      _target_: egomimic.utils.egomimicUtils.CameraTransforms
      intrinsics_key: identity
      extrinsics_key: identity

  diffusion: true
  6dof: false

  ac_keys:
    franka_right_arm: actions_cartesian

  trunk:
    embed_dim: 256
    num_blocks: 16
    num_heads: 8
    token_postprocessing: action_token
    observation_horizon: 1
    action_horizon: 100
    no_trunk: false
    use_domain_embedding: true
    drop_path: 0.1
    weight_init_style: pytorch

  multitask: false
  pretrained: false
  pretrained_checkpoint: ""
  reverse_kl_samples: 8

  domains: [franka_right_arm]
  shared_obs_keys: [front_img_1]

  shared_stem_specs:
    front_img_1:
      _target_: egomimic.models.hpt_nets.MLPPolicyStem
      input_dim: 256
      output_dim: 256
      widths: [256]
      specs:
        random_horizon_masking: false
        cross_attn:
          crossattn_latent: 16
          crossattn_heads: 8
          crossattn_dim_head: 64
          crossattn_modality_dropout: 0.1
          modality_embed_dim: 256

  stem_specs:
    franka_right_arm:
      state_ee_pose:
        _target_: egomimic.models.hpt_nets.MLPPolicyStem
        input_dim: 7
        output_dim: 256
        widths: [256]
        specs:
          random_horizon_masking: false
          cross_attn:
            crossattn_latent: 16
            crossattn_heads: 8
            crossattn_dim_head: 64
            crossattn_modality_dropout: 0.1
            modality_embed_dim: 256

  head_specs:
    franka_right_arm:
      _target_: egomimic.models.fm_policy.FMPolicy
      action_horizon: 100
      num_inference_steps: 50
      pooling: null
      time_dist: beta
      infer_ac_dims:
        franka_right_arm: 7
      model:
        _target_: egomimic.models.denoising_nets.CrossTransformer
        nblocks: 6
        cond_dim: 256
        hidden_dim: 128
        act_dim: 7
        act_seq: 100
        n_heads: 4
        dropout: 0.1
        mlp_layers: 4
        mlp_ratio: 4

    shared: null

  encoder_specs:
    front_img_1:
      _target_: egomimic.models.hpt_nets.ResNet
      output_dim: 256

  train_image_augs:
    _target_: torchvision.transforms.Compose
    transforms:
      - _target_: torchvision.transforms.ColorJitter
        brightness: 0.1
        contrast: 0.1
        saturation: 0.1
        hue: 0.05
      - _target_: torchvision.transforms.Normalize
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]
  eval_image_augs:
    _target_: torchvision.transforms.Compose
    transforms:
      - _target_: torchvision.transforms.Normalize
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]

optimizer:
  _target_: torch.optim.AdamW
  _partial_: true
  lr: 3e-4
  weight_decay: 0.0001

scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  _partial_: true
  T_max: 1400
  eta_min: 1e-5
