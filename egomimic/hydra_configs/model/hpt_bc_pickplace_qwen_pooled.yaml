# BC HPT (eva-only, robot data) + Qwen3-Embedding (last-token pooled) text stem.
# Pair with: data=bc_pickplace_eva_qwen
#   train = 216 eva_bimanual (pick_place, not alignment, dense-language gated)
#   valid = 12  eva_bimanual alignment
# Action format = actions_cartesian (cartesian_wristframe_ypr), act_dim=14.
_target_: egomimic.pl_utils.pl_model.ModelWrapper
robomimic_model:
  _target_: egomimic.algo.hpt.HPT

  camera_transforms:
    eva_bimanual:
      _target_: egomimic.utils.egomimicUtils.CameraTransforms
      intrinsics_key: "base"
      extrinsics_key: "x5Dec13_2"

  diffusion: true
  6dof: true

  ac_keys:
    eva_bimanual: "actions_cartesian"

  annotation_key: "annotations"
  annotation_sampling_mode: "random"
  annotation_modality: "annotation"
  default_prompt: ""

  trunk:
    embed_dim: 256
    num_blocks: 16
    num_heads: 8
    token_postprocessing: "action_token"
    observation_horizon: 1
    action_horizon: 64
    no_trunk: false
    use_domain_embedding: true
    drop_path: 0.1
    weight_init_style: "pytorch"

  multitask: false
  pretrained: false
  pretrained_checkpoint: ""
  reverse_kl_samples: 8

  domains: ["eva_bimanual"]
  shared_obs_keys: ["front_img_1", "annotation"]

  shared_stem_specs:
    front_img_1:
      _target_: egomimic.models.hpt_nets.MLPPolicyStem
      input_dim: 256
      output_dim: 256
      widths: [256]
      specs:
        random_horizon_masking: false
        cross_attn:
          crossattn_latent: 16
          crossattn_heads: 8
          crossattn_dim_head: 64
          crossattn_modality_dropout: 0.1
          modality_embed_dim: 256
    annotation:
      _target_: egomimic.models.hpt_nets.QwenPooledEncoder
      model_name: "Qwen/Qwen3-Embedding-0.6B"
      max_length: 128
      freeze: true
      dtype: "float16"
      output_dim: 256
      specs:
        random_horizon_masking: false
        cross_attn:
          crossattn_latent: 16
          crossattn_heads: 8
          crossattn_dim_head: 64
          crossattn_modality_dropout: 0.1
          modality_embed_dim: 256

  stem_specs:
    eva_bimanual:
      state_ee_pose:
        _target_: egomimic.models.hpt_nets.MLPPolicyStem
        input_dim: 14
        output_dim: 256
        widths: [256]
        specs:
          random_horizon_masking: false
          cross_attn:
            crossattn_latent: 16
            crossattn_heads: 8
            crossattn_dim_head: 64
            crossattn_modality_dropout: 0.1
            modality_embed_dim: 256

  head_specs:
    eva_bimanual:
      _target_: egomimic.models.fm_policy.FMPolicy
      action_horizon: 100
      num_inference_steps: 50
      pooling: null
      time_dist: "beta"
      infer_ac_dims:
        eva_bimanual: 14
      model:
        _target_: egomimic.models.denoising_nets.CrossTransformer
        nblocks: 6
        cond_dim: 256
        hidden_dim: 128
        act_dim: 14
        act_seq: 100
        n_heads: 4
        dropout: 0.1
        mlp_layers: 4
        mlp_ratio: 4

  encoder_specs:
    front_img_1:
      _target_: egomimic.models.hpt_nets.ResNet
      output_dim: 256
      num_of_copy: 1

  train_image_augs:
    _target_: torchvision.transforms.Compose
    transforms:
      - _target_: torchvision.transforms.ColorJitter
        brightness: 0.1
        contrast: 0.1
        saturation: 0.1
        hue: 0.05
      - _target_: torchvision.transforms.Normalize
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]
  eval_image_augs:
    _target_: torchvision.transforms.Compose
    transforms:
      - _target_: torchvision.transforms.Normalize
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]

optimizer:
  _target_: torch.optim.AdamW
  _partial_: true
  lr: 2e-4
  weight_decay: 0.0001

scheduler:
  _target_: egomimic.utils.scheduler_utils.warmup_then_cosine
  _partial_: true
  warmup_epochs: 100
  total_epochs: 2000
  eta_min: 1.0e-5
scheduler_interval: epoch
