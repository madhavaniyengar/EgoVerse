# BC eva-only pick_place dataset for the HPT + Qwen-annotation experiment.
# Same filters as cotrain_pickplace_qwen but aria_bimanual stripped out.
#   train = 216 eva_bimanual
#   valid = 12  eva_bimanual alignment
# Persistent zarr cache is shared with cotrain (no re-sync).
_target_: egomimic.pl_utils.pl_data_utils.MultiDataModuleWrapper

train_datasets:
  eva_bimanual:
    _target_: egomimic.rldb.zarr.zarr_dataset_multi.MultiDataset._from_resolver
    resolver:
      _target_: egomimic.rldb.zarr.zarr_dataset_multi.S3AnnotationCutoffEpisodeResolver
      folder_path: /storage/project/r-dxu345-0/paphiwetsa3/datasets/pickplace_qwen
      key_map:
        _target_: egomimic.rldb.embodiment.eva.Eva.get_keymap
        keymap_mode: cartesian
        annotation_key: annotations
      transform_list:
        _target_: egomimic.rldb.embodiment.eva.Eva.get_transform_list
        mode: cartesian
    filters:
      _target_: egomimic.rldb.filters.ScaleAnnotationDatasetFilter
      project_name: dense-language
      filter_lambdas:
        - "lambda row: row.get('task') == 'pick_place' and row.get('embodiment') == 'eva_bimanual' and (row.get('zarr_processed_path') or '') != '' and 'alignment' not in ((row.get('task_description') or '').lower())"
    mode: total

valid_datasets:
  eva_bimanual:
    _target_: egomimic.rldb.zarr.zarr_dataset_multi.MultiDataset._from_resolver
    resolver:
      _target_: egomimic.rldb.zarr.zarr_dataset_multi.S3AnnotationCutoffEpisodeResolver
      folder_path: /storage/project/r-dxu345-0/paphiwetsa3/datasets/pickplace_qwen
      key_map:
        _target_: egomimic.rldb.embodiment.eva.Eva.get_keymap
        keymap_mode: cartesian
        annotation_key: annotations
      transform_list:
        _target_: egomimic.rldb.embodiment.eva.Eva.get_transform_list
        mode: cartesian
    filters:
      _target_: egomimic.rldb.filters.ScaleAnnotationDatasetFilter
      project_name: dense-language
      filter_lambdas:
        - "lambda row: row.get('task') == 'pick_place' and row.get('embodiment') == 'eva_bimanual' and (row.get('zarr_processed_path') or '') != '' and 'alignment' in ((row.get('task_description') or '').lower())"
    mode: total

train_dataloader_params:
  eva_bimanual:
    batch_size: 32
    num_workers: 6
valid_dataloader_params:
  eva_bimanual:
    batch_size: 32
    num_workers: 6
