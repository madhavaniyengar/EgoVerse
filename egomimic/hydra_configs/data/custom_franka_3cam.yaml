_target_: egomimic.pl_utils.pl_data_utils.MultiDataModuleWrapper

train_datasets:
  franka_right_arm:
    _target_: egomimic.rldb.zarr.zarr_dataset_multi.MultiDataset._from_resolver
    resolver:
      _target_: egomimic.rldb.zarr.zarr_dataset_multi.LocalEpisodeResolver
      folder_path: ${paths.custom_franka_dataset_dir}
      key_map:
        _target_: egomimic.rldb.embodiment.custom.FrankaWrist.get_keymap
        keymap_mode: cartesian
      transform_list:
        _target_: egomimic.rldb.embodiment.custom.FrankaWrist.get_transform_list
        mode: cartesian
    mode: total

valid_datasets:
  franka_right_arm:
    _target_: egomimic.rldb.zarr.zarr_dataset_multi.MultiDataset._from_resolver
    resolver:
      _target_: egomimic.rldb.zarr.zarr_dataset_multi.LocalEpisodeResolver
      folder_path: ${paths.custom_franka_dataset_dir}
      key_map:
        _target_: egomimic.rldb.embodiment.custom.FrankaWrist.get_keymap
        keymap_mode: cartesian
      transform_list:
        _target_: egomimic.rldb.embodiment.custom.FrankaWrist.get_transform_list
        mode: cartesian
    mode: total

train_dataloader_params:
  franka_right_arm:
    batch_size: 32
    num_workers: 6
valid_dataloader_params:
  franka_right_arm:
    batch_size: 32
    num_workers: 6
