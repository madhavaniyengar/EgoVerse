defaults:
  - viz@viz_func: cartesian_wrist_lang
  - _self_

_target_: egomimic.eval.eval_hpt.HPTEvalVideo

# Per-embodiment revert transform. Applied once during validation to project
# the model's wrist-frame action chunks back to cam (head) frame, then reused
# for both the cam-frame MSE and the viz video.
transform_lists:
  eva_bimanual:
    _target_: egomimic.rldb.embodiment.eva._build_eva_bimanual_revert_eef_frame_transform_list
    is_quat: false
  aria_bimanual:
    _target_: egomimic.rldb.embodiment.human._build_aria_cartesian_revert_eef_frame_transform_list
    is_quat: false
